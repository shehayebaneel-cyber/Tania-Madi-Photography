# Render Blueprint for Tania Madi Photography.
# rghome-style: an API (Node/Express/Prisma) + a static web front-end (Vite build).
# Database is Neon Postgres. Secret env vars are set in the Render dashboard (sync: false).
services:
  - type: web
    name: tania-api
    runtime: node
    rootDir: server
    plan: free
    region: virginia
    # --include=dev: build needs typescript/@types/node/prisma, which npm would
    # otherwise skip because NODE_ENV=production.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: WEB_URL
        fromService:
          type: web
          name: tania-web
          property: host

  - type: web
    name: tania-web
    runtime: static
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      # Explicit value — Render's fromService wiring arrived empty at build time.
      - key: VITE_API_URL
        value: https://tania-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
